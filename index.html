<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAZKIPLAY HUNTING DORK HUNTER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        :root {
            --primary: #ff003c;
            --secondary: #00f2ff;
            --bg-dark: #050505;
            --card-bg: #0d0d0f;
            --accent: #1a1a22;
            --neon-shadow: 0 0 15px rgba(255, 0, 60, 0.4);
        }
        body {
            background-color: var(--bg-dark);
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }
        #disclaimerOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .disclaimer-card {
            background: var(--card-bg);
            border: 1px solid var(--primary);
            border-radius: 4px;
            padding: 30px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: var(--neon-shadow);
        }
        .mobile-container {
            max-width: 500px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--bg-dark);
            position: relative;
            padding-bottom: 50px;
            border-left: 1px solid var(--accent);
            border-right: 1px solid var(--accent);
        }
        .header-app {
            background: linear-gradient(180deg, #1a0006 0%, #050505 100%);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 2px solid var(--primary);
        }
        .logo-box {
            width: 70px;
            height: 70px;
            border: 2px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: var(--neon-shadow);
            transform: rotate(45deg);
        }
        .logo-box i {
            transform: rotate(-45deg);
            color: var(--primary);
        }
        .search-area {
            padding: 20px;
            margin-top: -20px;
        }
        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--accent);
            padding: 20px;
            margin-bottom: 20px;
        }
        .input-mobile {
            background: #000 !important;
            border: 1px solid var(--primary) !important;
            color: var(--secondary) !important;
            border-radius: 0 !important;
            padding: 12px;
            font-size: 16px;
            font-family: monospace;
        }
        .btn-hunt {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0;
            padding: 15px;
            font-weight: bold;
            width: 100%;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.2s;
            cursor: pointer;
        }
        .btn-hunt:active {
            background: #cc0030;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 0 20px;
            margin-bottom: 20px;
        }
        .stat-item {
            background: #0a0a0c;
            padding: 15px;
            text-align: center;
            border: 1px solid var(--accent);
        }
        .stat-val {
            display: block;
            font-size: 14px;
            font-weight: bold;
            color: var(--secondary);
            word-break: break-all;
        }
        .stat-label {
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
        }
        .result-area {
            padding: 0 20px;
        }
        .category-title {
            color: var(--primary);
            font-size: 12px;
            margin: 25px 0 10px;
            border-left: 3px solid var(--primary);
            padding-left: 10px;
            text-transform: uppercase;
            font-weight: bold;
        }
        .info-card {
            background: #0d0d0f;
            border: 1px solid var(--secondary);
            padding: 12px;
            margin-bottom: 20px;
            font-size: 11px;
            color: var(--secondary);
        }
        .dork-item {
            background: #0d0d0f;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #1a1a22;
        }
        .dork-meta {
            font-size: 9px;
            color: #555;
            margin-bottom: 8px;
        }
        .dork-pattern {
            color: #00ff41;
            font-size: 12px;
            word-break: break-all;
            display: block;
            margin-bottom: 12px;
            cursor: pointer;
            padding: 5px;
            background: rgba(0,255,65,0.05);
        }
        .engine-scroll {
            display: flex;
            overflow-x: auto;
            gap: 10px;
        }
        .engine-link {
            background: #1a1a22;
            color: #aaa;
            text-decoration: none;
            padding: 5px 12px;
            font-size: 11px;
            border: 1px solid #333;
        }
        .engine-link:hover {
            border-color: var(--secondary);
            color: var(--secondary);
        }
        .loading-spin {
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="disclaimerOverlay">
        <div class="disclaimer-card">
            <div class="logo-box">
                <i class="fas fa-biohazard fa-2x"></i>
            </div>
            <h4 class="fw-bold mb-3" style="color:var(--primary)">SYSTEM WARNING</h4>
            <p class="small mb-4" style="color:#888">
                PENGGUNAAN TOOL MAZKIPLAY HUNTING DORK HUNTER ADALAH UNTUK KEPERLUAN AUDIT KEAMANAN LEGAL. SEGALA RISIKO PENYALAHGUNAAN ADALAH TANGGUNG JAWAB PENUH USER.
            </p>
            <div class="form-check text-start mb-4 bg-black p-3" style="border:1px solid #222;">
                <input class="form-check-input" type="checkbox" id="agreeCheck">
                <label class="form-check-label small ms-2" for="agreeCheck">
                    SAYA SETUJU & BERTANGGUNG JAWAB
                </label>
            </div>
            <button id="enterApp" class="btn-hunt" style="margin-top:0" disabled>INITIALIZE ACCESS</button>
        </div>
    </div>
    <div class="mobile-container d-none" id="mainApp">
        <div class="header-app">
            <div class="logo-box">
                <i class="fas fa-user-secret fa-2x"></i>
            </div>
            <h5 class="fw-bold mb-1" style="letter-spacing:3px">MAZKIPLAY HUNTING</h5>
            <p class="small mb-0" style="color:var(--secondary)">BRUTAL SENSITIVE HUNTER v7.0</p>
        </div>
        <div class="search-area">
            <div class="glass-card">
                <label class="small mb-2" style="color:#666">TERMINAL_INPUT: DOMAIN_OR_IP</label>
                <input type="text" id="targetInput" class="form-control input-mobile" placeholder="example.com OR 1.1.1.1" value="">
                <button class="btn-hunt" id="huntBtn">
                    EXECUTE BRUTAL RECON
                </button>
            </div>
        </div>
        <div class="stat-grid">
            <div class="stat-item">
                <span class="stat-val" id="targetType">-</span>
                <span class="stat-label">Target Type</span>
            </div>
            <div class="stat-item">
                <span class="stat-val" id="ipVal">-</span>
                <span class="stat-label">Resolved IP</span>
            </div>
        </div>
        <div class="result-area">
            <div id="infraSection"></div>
            <div id="resultsContainer">
                <div class="text-center py-5" style="color:#333">
                    <i class="fas fa-terminal fa-3x mb-3"></i>
                    <p class="small">WAITING FOR INPUT...</p>
                </div>
            </div>
        </div>
    </div>
    <script>
        $(document).ready(function() {
            const DORK_CATEGORIES = {
                "GOVERNMENT_&_STATE_LEAKS": [
                    'filetype:pdf "SURAT KEPUTUSAN" | "RAHASIA NEGARA"',
                    'filetype:xlsx "ANGGARAN NEGARA" | "LAPORAN KEUANGAN"',
                    'site:go.id filetype:sql | filetype:env',
                    'site:go.id "NIK" | "NOMOR INDUK KEPENDUDUKAN"',
                    'site:go.id "internal" | "confidential" filetype:doc'
                ],
                "BANKING_&_FINANCE_EXPOSURE": [
                    'filetype:pdf "REKENING KORAN" | "BANK STATEMENT"',
                    'filetype:xlsx "DAFTAR NASABAH" | "CUSTOMER DATA"',
                    'filetype:pdf "SWIFT" | "IBAN" | "ACCOUNT NUMBER"',
                    'inurl:banking | inurl:finance "password="',
                    'ext:log "bank" | "transaksi" "success"'
                ],
                "CITIZEN_DATA_LEAKS_(NIK/KK)": [
                    'filetype:pdf "NIK" | "KK" | "DPT"',
                    'filetype:xlsx "KTP" | "KARTU KELUARGA"',
                    'intitle:"index of" "identitas" | "ktp" | "kk"',
                    'ext:txt "nik" | "kk" "password"'
                ],
                "ADMIN_&_LOGIN_CRITICAL": [
                    'inurl:admin | inurl:login | inurl:wp-login',
                    'inurl:cpanel | inurl:webmail | inurl:dashboard',
                    'intitle:"Administrator Login" | intitle:"Sign In"',
                    'inurl:/admin/config.php | inurl:/phpmyadmin/'
                ],
                "SUBDOMAIN_BRUTAL": [
                    'site:*.target -www',
                    'site:dev.target | site:api.target',
                    'site:staging.target | site:test.target',
                    'site:mail.target | site:vpn.target'
                ],
                "SENSITIVE_CONFIG_&_SQL": [
                    'inurl:".env" | "wp-config.php"',
                    'ext:sql | ext:db | ext:sqlite "password"',
                    'inurl:index.php?id=',
                    'inurl:search.php?q=',
                    'inurl:view.php?id='
                ]
            };
            function isIP(str) {
                const regex = /^(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$/;
                return regex.test(str);
            }
            $('#agreeCheck').on('change', function() {
                $('#enterApp').prop('disabled', !this.checked);
            });
            $('#enterApp').on('click', function() {
                $('#disclaimerOverlay').fadeOut();
                $('#mainApp').removeClass('d-none');
            });
            window.copyDork = function(text) {
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                alert('DORK COPIED');
            };
            async function fetchInfra(target) {
                let ip = "N/A";
                let type = "DOMAIN";
                if(isIP(target)) {
                    ip = target;
                    type = "IP_ADDRESS";
                } else {
                    try {
                        const dnsRes = await fetch(`https://dns.google/resolve?name=${target}`);
                        const dnsData = await dnsRes.json();
                        ip = dnsData.Answer ? dnsData.Answer[0].data : "Unknown";
                    } catch(e) { ip = "Error"; }
                }
                $('#targetType').text(type);
                $('#ipVal').text(ip);
                let infraHtml = `
                    <div class="category-title">INFRASTRUCTURE RECON</div>
                    <div class="info-card">
                        <p class="mb-1"><strong>Target:</strong> ${target}</p>
                        <p class="mb-1"><strong>Resolved:</strong> ${ip}</p>
                        <p class="mb-1"><strong>Port Scan:</strong> <a href="https://viewdns.info/portscan/?host=${target}" target="_blank" style="color:var(--secondary)">Scan Open Ports</a></p>
                        <p class="mb-1"><strong>Whois:</strong> <a href="https://viewdns.info/whois/?domain=${target}" target="_blank" style="color:var(--secondary)">Whois Lookup</a></p>
                        <p class="mb-0"><strong>Subdomains:</strong> <a href="https://subdomainfinder.c99.nl/index.php?domain=${target}" target="_blank" style="color:var(--secondary)">External Scanner</a></p>
                    </div>
                `;
                $('#infraSection').html(infraHtml);
                return { type, ip };
            }
            async function generateResults() {
                const target = $('#targetInput').val().trim();
                if (!target) return;
                const btn = $('#huntBtn');
                btn.html('<i class="fas fa-sync loading-spin"></i> RECONNING...').prop('disabled', true);
                const info = await fetchInfra(target);
                let html = '';
                setTimeout(() => {
                    for (const [cat, patterns] of Object.entries(DORK_CATEGORIES)) {
                        html += `<div class="category-title">${cat.replace(/_/g, ' ')}</div>`;
                        patterns.forEach(p => {
                            let dorkPattern = p;
                            if (p.includes('target')) {
                                dorkPattern = p.replace(/target/g, target);
                            }
                            const prefix = info.type === "DOMAIN" ? `site:${target}` : `ip:${target}`;
                            const fullDork = p.includes('site:') || p.includes('target') ? dorkPattern : `${prefix} ${dorkPattern}`;
                            const encoded = encodeURIComponent(fullDork);
                            html += `
                                <div class="dork-item">
                                    <div class="dork-meta">${cat} | ${target}</div>
                                    <span class="dork-pattern" onclick="copyDork('${fullDork.replace(/'/g, "\\'")}')">${fullDork}</span>
                                    <div class="engine-scroll">
                                        <a href="https://www.google.com/search?q=${encoded}" target="_blank" class="engine-link">GOOGLE</a>
                                        <a href="https://www.bing.com/search?q=${encoded}" target="_blank" class="engine-link">BING</a>
                                        <a href="https://yandex.com/search/?text=${encoded}" target="_blank" class="engine-link">YANDEX</a>
                                    </div>
                                </div>
                            `;
                        });
                    }
                    $('#resultsContainer').html(html);
                    btn.html('EXECUTE BRUTAL RECON').prop('disabled', false);
                }, 1000);
            }
            $('#huntBtn').on('click', generateResults);
            $('#targetInput').on('keypress', function(e) {
                if(e.which === 13) generateResults();
            });
        });
    </script>
</body>
</html>
